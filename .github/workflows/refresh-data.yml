name: Refresh leaderboard

on:
  schedule:
    # 14:00 UTC = 21:00 WIB tiap hari
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_SESSION_COOKIE: ${{ secrets.STRAVA_SESSION_COOKIE }}
          STRAVA_CLUB_ID: "223457"
        run: node fetch-data.js

      - name: Commit & push perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "Auto-refresh leaderboard (jam 21 WIB) [skip ci]"
            git push
          fi